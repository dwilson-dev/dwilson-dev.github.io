<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darryl Wilson | Professional Identity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0078d4; /* Microsoft Blue */
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --text: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 6px solid var(--primary);
        }

        .profile-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 600;
        }

        .tagline {
            color: var(--primary);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .bio {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2.5rem;
        }

        .contact-stack {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #005a9e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,120,212,0.3);
        }

        .social-links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-links a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: var(--primary);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #bbb;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .container { padding: 2rem; }
            .profile-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="profile-header">
            <h1>Darryl Wilson</h1>
            <div class="tagline">Tech Strategist & Professional</div>
        </header>

        <section class="bio">
            <p>Welcome to my professional home. I specialize in building robust digital identities and managing complex cloud infrastructure.</p>
        </section>

        <div class="contact-stack">
            <a href="mailto:dw@darrylwilson.com" class="btn btn-primary">Get In Touch</a>
        </div>

        <div class="social-links">
            <a href="#">LinkedIn</a>
            <a href="https://github.com/dwilson-dev">GitHub</a>
            <a href="#">Twitter</a>
        </div>

        <footer>
            &copy; 2026 Darryl Wilson. Verified Identity.
        </footer>
    </div>

</body>
</html>
